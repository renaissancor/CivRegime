<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CivRegime — Regimes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; height: 100vh; background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; overflow: hidden; }

    .topnav { display: flex; align-items: center; gap: 4px; background: #161b27; border-bottom: 1px solid #2d3748; padding: 0 16px; height: 44px; flex-shrink: 0; }
    .nav-brand { font-weight: 700; font-size: 14px; color: #f6ad55; letter-spacing: 0.08em; text-transform: uppercase; margin-right: 8px; }
    .nav-link { color: #a0aec0; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 4px; transition: background 0.15s, color 0.15s; }
    .nav-link:hover { background: #1e2535; color: #e2e8f0; }
    .nav-link.active { color: #f6ad55; background: #1e2535; }

    .main-row { display: flex; flex: 1; overflow: hidden; }

    #sidebar { width: 260px; flex-shrink: 0; background: #161b27; border-right: 1px solid #2d3748; display: flex; flex-direction: column; overflow-y: auto; }
    #sidebar-header { padding: 16px 16px 8px; }
    #sidebar-header h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #718096; }
    
    #search-box { padding: 12px 16px; }
    #search-box input { width: 100%; padding: 6px 8px; background: #0f1117; border: 1px solid #2d3748; color: #e2e8f0; border-radius: 4px; font-size: 12px; }
    #search-box input::placeholder { color: #4a5568; }

    .state-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #4a5568; padding: 10px 16px 4px; margin-top: 8px; }
    .state-label:first-of-type { margin-top: 0; }
    .regime-item { padding: 6px 16px; cursor: pointer; color: #a0aec0; font-size: 12px; transition: background 0.1s, color 0.1s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .regime-item:hover { background: #1e2535; color: #e2e8f0; }
    .regime-item.active { background: #252e42; color: #f6ad55; }

    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 24px 32px; gap: 12px; }

    #regime-header { flex-shrink: 0; }
    #regime-title { font-size: 24px; font-weight: 600; color: #f6ad55; margin-bottom: 12px; }
    
    .regime-info-row { display: flex; gap: 32px; flex-wrap: wrap; margin-bottom: 16px; }
    .regime-info-block { display: flex; flex-direction: column; }
    .regime-info-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #718096; margin-bottom: 4px; }
    .regime-info-value { font-size: 14px; color: #e2e8f0; font-weight: 500; }
    .regime-info-value.secondary { color: #a0aec0; font-size: 12px; }

    .succession-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #2d3748; }
    .succession-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #718096; margin-bottom: 12px; font-weight: 600; }
    .succession-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .succession-badge { 
      padding: 4px 12px; 
      background: #1e2535; 
      border: 1px solid #2d3748; 
      border-radius: 4px; 
      font-size: 11px;
      color: #a0aec0;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .succession-badge:hover { background: #252e42; border-color: #4a5568; }
    .succession-badge.direct { border-color: #4ade80; color: #4ade80; }
    .succession-badge.direct_gap { border-color: #facc15; color: #facc15; }
    .succession-badge.weak { border-color: #fb923c; color: #fb923c; }
    .succession-badge.ethnic { border-color: #06b6d4; color: #06b6d4; }

    .territory-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #2d3748; }
    .territory-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: #718096; margin-bottom: 12px; font-weight: 600; }
    .territory-list { display: flex; gap: 6px; flex-wrap: wrap; }
    .territory-badge { 
      padding: 3px 10px; 
      background: #1e2535; 
      border: 1px solid #2d3748; 
      border-radius: 3px; 
      font-size: 11px;
      color: #a0aec0;
    }

    #empty-state { display: flex; align-items: center; justify-content: center; height: 300px; color: #4a5568; font-size: 14px; }

    #tooltip { position: fixed; background: #1e2535; border: 1px solid #2d3748; border-radius: 4px; padding: 8px 10px; font-size: 11px; color: #e2e8f0; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100; max-width: 250px; line-height: 1.6; }
    #tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
<nav class="topnav">
  <span class="nav-brand">CivRegime</span>
  <a href="/" class="nav-link active">Regimes</a>
  <a href="/religion/" class="nav-link">Religions</a>
  <a href="/language/" class="nav-link">Languages</a>
  <a href="/ethnicity/" class="nav-link">Ethnicities</a>
  <a href="/territory/" class="nav-link">Territories</a>
</nav>
<div class="main-row">
  <div id="sidebar">
    <div id="sidebar-header"><h2>Regimes</h2></div>
    <div id="search-box">
      <input type="text" id="regime-search" placeholder="Search regimes...">
    </div>
    <div id="regime-list"></div>
  </div>
  <div id="main">
    <div id="regime-header">
      <div id="empty-state">← Choose a regime to view details</div>
    </div>
  </div>
</div>
<div id="tooltip"></div>
<script src="app.js"></script>
</body>
</html>
