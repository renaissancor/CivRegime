<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CivRegime — Territory Timeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; height: 100vh; background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; overflow: hidden; }

    .topnav { display: flex; align-items: center; gap: 4px; background: #161b27; border-bottom: 1px solid #2d3748; padding: 0 16px; height: 44px; flex-shrink: 0; }
    .nav-brand { font-weight: 700; font-size: 14px; color: #f6ad55; letter-spacing: 0.08em; text-transform: uppercase; margin-right: 8px; }
    .nav-link { color: #a0aec0; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 4px; transition: background 0.15s, color 0.15s; }
    .nav-link:hover { background: #1e2535; color: #e2e8f0; }
    .nav-link.active { color: #f6ad55; background: #1e2535; }

    .main-row { display: flex; flex: 1; overflow: hidden; }

    #sidebar { width: 220px; flex-shrink: 0; background: #161b27; border-right: 1px solid #2d3748; display: flex; flex-direction: column; overflow-y: auto; padding-bottom: 16px; }
    #sidebar-header { padding: 16px 16px 8px; }
    #sidebar-header h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #718096; }
    .region-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #4a5568; padding: 10px 16px 4px; }
    .territory-item { padding: 6px 16px; cursor: pointer; color: #a0aec0; font-size: 12px; transition: background 0.1s, color 0.1s; }
    .territory-item:hover { background: #1e2535; color: #e2e8f0; }
    .territory-item.active { background: #252e42; color: #f6ad55; }

    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 24px 32px; gap: 12px; }

    #territory-header { flex-shrink: 0; }
    #territory-title { font-size: 20px; font-weight: 600; color: #f6ad55; }
    #territory-desc { font-size: 12px; color: #718096; margin-top: 4px; line-height: 1.5; max-width: 700px; }

    #timeline-container { flex: 1; overflow: hidden; position: relative; }
    #timeline-container svg { display: block; cursor: grab; }
    #timeline-container svg:active { cursor: grabbing; }
    #timeline-container svg text { font-family: 'Segoe UI', system-ui, sans-serif; }

    #empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: #4a5568; font-size: 14px; }

    #legend { display: flex; flex-wrap: wrap; gap: 8px; flex-shrink: 0; padding-top: 8px; border-top: 1px solid #2d3748; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #a0aec0; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 2px; }

    #tooltip { position: fixed; background: #1e2535; border: 1px solid #2d3748; border-radius: 4px; padding: 8px 10px; font-size: 11px; color: #e2e8f0; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100; max-width: 220px; line-height: 1.6; }
    #tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
<nav class="topnav">
  <span class="nav-brand">CivRegime</span>
  <a href="/" class="nav-link">Regimes</a>
  <a href="/religion/" class="nav-link">Religions</a>
  <a href="/language/" class="nav-link">Languages</a>
  <a href="/ethnicity/" class="nav-link">Ethnicities</a>
  <a href="/territory/" class="nav-link active">Territories</a>
</nav>
<div class="main-row">
  <div id="sidebar">
    <div id="sidebar-header"><h2>Territories</h2></div>
    <div id="territory-list"></div>
  </div>
  <div id="main">
    <div id="territory-header">
      <div id="territory-title">Select a territory</div>
      <div id="territory-desc"></div>
    </div>
    <div id="timeline-container">
      <div id="empty-state">← Choose a territory to view its history</div>
    </div>
    <div id="legend"></div>
  </div>
</div>
<div id="tooltip"></div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="app.js"></script>
</body>
</html>
