<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CivRegime — Language Tree</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; flex-direction: column; height: 100vh; background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; overflow: hidden; }

    .topnav { display: flex; align-items: center; gap: 4px; background: #161b27; border-bottom: 1px solid #2d3748; padding: 0 16px; height: 44px; flex-shrink: 0; }
    .nav-brand { font-weight: 700; font-size: 14px; color: #f6ad55; letter-spacing: 0.08em; text-transform: uppercase; margin-right: 8px; }
    .nav-link { color: #a0aec0; text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 4px; transition: background 0.15s, color 0.15s; }
    .nav-link:hover { background: #1e2535; color: #e2e8f0; }
    .nav-link.active { color: #f6ad55; background: #1e2535; }

    .main-row { display: flex; flex: 1; overflow: hidden; }

    #sidebar { width: 200px; flex-shrink: 0; background: #161b27; border-right: 1px solid #2d3748; display: flex; flex-direction: column; padding: 16px; gap: 8px; overflow-y: auto; }
    #sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #718096; margin-bottom: 4px; }

    .family-btn {
      display: block; width: 100%; text-align: left;
      background: #1e2535; border: 1px solid #2d3748; border-left: 3px solid transparent;
      color: #a0aec0; padding: 7px 10px; border-radius: 4px; cursor: pointer;
      font-size: 12px; transition: border-color 0.15s, color 0.15s;
    }
    .family-btn:hover { color: #e2e8f0; border-color: #4a5568; }
    .family-btn.active { color: #f6ad55; background: #252e42; }

    #main { flex: 1; overflow: hidden; position: relative; }
    #tree-svg { width: 100%; height: 100%; }

    .link { fill: none; stroke: #2d3748; stroke-width: 1.5px; }
    .node text { font-size: 12px; fill: #e2e8f0; }
    .node text.extinct { fill: #4a5568; font-style: italic; }

    #detail-panel { width: 0; overflow: hidden; background: #161b27; border-left: 1px solid #2d3748; transition: width 0.25s ease; flex-shrink: 0; position: relative; }
    #detail-panel.open { width: 280px; overflow-y: auto; }
    .detail-inner { padding: 16px; display: flex; flex-direction: column; gap: 10px; min-width: 280px; }
    .detail-inner h2 { font-size: 15px; color: #f6ad55; }
    .detail-inner .sub { font-size: 11px; color: #718096; }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #718096; border-top: 1px solid #2d3748; padding-top: 8px; }
    .regime-item { background: #1e2535; border: 1px solid #2d3748; border-radius: 4px; padding: 6px 8px; }
    .regime-item strong { display: block; font-size: 12px; color: #e2e8f0; }
    .regime-item span { font-size: 10px; color: #718096; }
    .close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #718096; cursor: pointer; font-size: 16px; padding: 4px; }
    .close-btn:hover { color: #e2e8f0; }

    #tooltip { position: fixed; background: #1e2535; border: 1px solid #2d3748; border-radius: 4px; padding: 8px 10px; font-size: 11px; color: #e2e8f0; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100; max-width: 200px; line-height: 1.5; }
    #tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
<nav class="topnav">
  <span class="nav-brand">CivRegime</span>
  <a href="/" class="nav-link">Regimes</a>
  <a href="/religion/" class="nav-link">Religions</a>
  <a href="/language/" class="nav-link active">Languages</a>
  <a href="/territory/" class="nav-link">Territories</a>
</nav>
<div class="main-row">
  <div id="sidebar">
    <h2>Language Families</h2>
    <div id="family-list"></div>
  </div>
  <div id="main">
    <svg id="tree-svg"></svg>
  </div>
  <div id="detail-panel">
    <button class="close-btn" onclick="document.getElementById('detail-panel').classList.remove('open')">✕</button>
    <div class="detail-inner" id="detail-content"></div>
  </div>
</div>
<div id="tooltip"></div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="app.js"></script>
</body>
</html>
